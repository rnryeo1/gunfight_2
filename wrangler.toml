# Cloudflare Pages (정적 dist). 프로젝트 이름은 package.json 의 pages:deploy 와 맞출 것.
#
# 사전 준비
#   - Cloudflare 대시보드에서 Pages 프로젝트 생성(이름 예: gun-fight) 또는 최초 deploy 시 안내 따르기
#   - API 토큰: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
#     (Pages 편집 권한) → 터미널에서 set CLOUDFLARE_API_TOKEN=...
#
# 배포
#   1) .env.production 에 VITE_MP_WS=wss://... (또는 빌드 전 환경변수)
#   2) npm run pages:deploy
#
# Git 연동으로만 쓸 때는 이 파일 없이 대시보드 Build 변수 VITE_MP_WS 만 설정해도 됩니다.

name = "gun-fight"
compatibility_date = "2024-12-30"
pages_build_output_dir = "dist"

# Fly.io: `fly launch` 후 app 이름·리전만 맞추면 됩니다.
# https://fly.io/docs/js/the-basics/

app = 'gun-fight-mp'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

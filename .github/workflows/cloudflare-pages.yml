# main 푸시 시 빌드 후 Cloudflare Pages(gunfight2) 배포.
# GitHub → 저장소 Settings → Secrets and variables → Actions 에 다음 추가:
#   CLOUDFLARE_API_TOKEN  (Account → Cloudflare Pages → Edit 권한)
#   CLOUDFLARE_ACCOUNT_ID (대시보드 오른쪽 사이드바 또는 Workers 개요에서 Account ID)
#
# Cloudflare 대시보드에서 같은 레포로 Pages Git 연동을 켜 두었다면 빌드가 중복될 수 있음.
# 이 워크플로만 쓸 경우: Pages 프로젝트 Settings → Builds → 자동 배포 끄기 또는 Git 연결 해제.
#
# --branch / --commit-hash 로 Cloudflare Deployments 에 Git 커밋이 묶여 보이고,
# gitHubToken 으로 GitHub 저장소의 Deployments 탭에도 상태가 남을 수 있음.
name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install and build
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        id: pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy dist --project-name=gunfight2
            --branch=${{ github.ref_name }}
            --commit-hash=${{ github.sha }}
            --commit-dirty=false

# main 푸시 시 빌드 후 Cloudflare Pages(gunfight2) 배포.
#
# 필수: GitHub → 저장소 Settings → Secrets and variables → Actions
#   CLOUDFLARE_API_TOKEN   (Account → Cloudflare Pages → Edit)
#   CLOUDFLARE_ACCOUNT_ID  (대시보드 오른쪽 Account ID)
#
# Cloudflare에서 배포/커밋이 안 보이면:
#   - GitHub Actions 탭에서 이 워크플로가 초록인지 확인 (Secrets 없으면 첫 단계에서 실패)
#   - Workers 목록이 아니라 Pages 프로젝트 → Deployments 를 연다
#   - 프로젝트 이름이 gunfight2 가 맞는지 확인 (다르메 아래 --project-name 수정)
#
# 대시보드에서 같은 레포로 Pages Git 연동을 켜 두었다면 빌드가 중복될 수 있음.
name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install and build
        run: npm ci && npm run build

      - name: Require Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::GitHub 저장소 Settings → Secrets and variables → Actions 에서"
            echo "::error::CLOUDFLARE_API_TOKEN 과 CLOUDFLARE_ACCOUNT_ID 를 등록해야 배포됩니다."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler pages deploy dist \
            --project-name=gunfight2 \
            --branch="$GITHUB_REF_NAME" \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="Actions ${GITHUB_SHA:0:7}" \
            --commit-dirty=false

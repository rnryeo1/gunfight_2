# main 푸시 → 빌드 → Cloudflare Worker(gunfight2) + dist 정적 자산 배포
# 대시보드의 gunfight2.qmfwikkd.workers.dev 가 여기서 갱신됨 (Pages 아님)
#
# GitHub → Settings → Secrets and variables → Actions
#   CLOUDFLARE_API_TOKEN   (Workers Scripts Edit + 필요 시 기타)
#   CLOUDFLARE_ACCOUNT_ID
name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: cf-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install and build
        run: npm ci && npm run build

      - name: Require Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Settings → Secrets → Actions 에 CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID 필요"
            exit 1
          fi

      - name: wrangler deploy (Worker + dist)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
